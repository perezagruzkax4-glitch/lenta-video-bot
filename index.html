<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LentaVideo</title>
    <link rel="stylesheet" href="./src/styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Контейнер для вкладок (страниц) -->
    <div id="tab-content" class="tab-content">
        <!-- Вкладка "Главная" (лента видео) -->
        <div id="feed-tab" class="page active">
            <div class="video-feed-container">
                <div id="videoFeed" class="video-feed"></div>
                <!-- Панель действий (лайк/коммент) -->
                <div class="actions-panel">
                    <button class="action-btn like-btn">❤️ 0</button>
                    <button class="action-btn comment-btn">💬 0</button>
                </div>
            </div>
        </div>

        <!-- Вкладка "Загрузить" -->
        <div id="upload-tab" class="page">
            <div class="upload-container">
                <h2>Загрузить видео</h2>
                <form id="uploadForm">
                    <input type="file" accept="video/*" id="videoFile" required>
                    <input type="text" placeholder="Название" id="videoTitle" required>
                    <textarea placeholder="Описание" id="videoDesc"></textarea>
                    <button type="submit">Отправить</button>
                </form>
                <div id="uploadStatus"></div>
            </div>
        </div>

        <!-- Вкладка "Профиль" -->
        <div id="profile-tab" class="page">
            <div class="profile-container">
                <div class="profile-header">
                    <img id="userAvatar" src="https://via.placeholder.com/80" alt="Аватар">
                    <h3 id="userName">@username</h3>
                </div>
                <div class="profile-stats">
                    <div><span id="videoCount">0</span> видео</div>
                    <div><span id="likesCount">0</span> лайков</div>
                </div>
                <button id="logoutBtn">Выйти</button>
            </div>
        </div>
    </div>

    <!-- Нижняя панель навигации -->
    <div class="bottom-nav">
        <button class="nav-btn active" data-tab="feed">🏠 Главная</button>
        <button class="nav-btn" data-tab="upload">➕ Загрузить</button>
        <button class="nav-btn" data-tab="profile">👤 Профиль</button>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
