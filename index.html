<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LentaVideo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем библиотеку для работы с Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <h2>🔥 LentaVideo</h2>
        <!-- Сюда будет вставляться видео -->
        <div id="video-container" class="video-container">
            <video id="video-player" controls playsinline loop></video>
        </div>
        <div class="actions">
            <button id="like-btn" class="action-btn">❤️ <span id="like-count">0</span></button>
            <div class="view-count">👁️ <span id="view-count">0</span></div>
        </div>
        <!-- Кнопка для перехода к следующему видео -->
        <button id="next-btn" class="next-btn">⏩ Следующее видео</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
